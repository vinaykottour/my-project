name: Rollback Prod

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number to rollback to (e.g. 5)'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Rollback Prod EC2 to previous version
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker stop portfolio || true
            docker rm portfolio || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/my-portfolio:${{ github.event.inputs.version }}
            docker run -d -p 80:80 --name portfolio ${{ secrets.DOCKER_USERNAME }}/my-portfolio:${{ github.event.inputs.version }}
            echo "✅ Rolled back to version ${{ github.event.inputs.version }}!"
