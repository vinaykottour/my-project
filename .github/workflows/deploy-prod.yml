name: Deploy to Prod (Kubernetes)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/my-portfolio:latest
            ${{ secrets.DOCKER_USERNAME }}/my-portfolio:${{ github.run_number }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name my-portfolio-cluster --region us-east-1

      - name: Deploy new image to Kubernetes
        run: |
          kubectl set image deployment/portfolio-deployment portfolio=${{ secrets.DOCKER_USERNAME }}/my-portfolio:${{ github.run_number }}
          kubectl rollout status deployment/portfolio-deployment
          echo "✅ Deployed version ${{ github.run_number }} to Kubernetes!"
