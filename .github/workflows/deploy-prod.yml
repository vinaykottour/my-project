name: Deploy to Prod

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/my-portfolio:latest
            ${{ secrets.DOCKER_USERNAME }}/my-portfolio:${{ github.run_number }}

      - name: Deploy to Prod EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker stop portfolio || true
            docker rm portfolio || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/my-portfolio:latest
            docker run -d -p 80:80 --name portfolio ${{ secrets.DOCKER_USERNAME }}/my-portfolio:latest
            echo "✅ Deployed version ${{ github.run_number }} to prod!"
